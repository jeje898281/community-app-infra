# docker-compose.dev.yml
# 適用於本機開發環境。支援熱重載、健康檢查、清楚的 service 分層與命名。

services:
  ###########################################################################
  # 🗄️ PostgreSQL 資料庫
  ###########################################################################
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "127.0.0.1:5432:5432"  # 僅開放給本機連線
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-net

  ###########################################################################
  # 🐏 Redis 快取 / 佇列中介
  ###########################################################################
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-net

  ###########################################################################
  # 👷 Worker（BullMQ / Celery 背景任務）
  ###########################################################################
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env.dev
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app
    networks:
      - service-net

  ###########################################################################
  # 🔙 Backend (Node.js + Express/Fastify)
  ###########################################################################
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: npx nodemon src/index.js
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_db}
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - service-net
      - edge-net

  ###########################################################################
  # 🌐 Frontend (React + Vite)
  ###########################################################################
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../frontend:/app
    depends_on:
      - backend
    networks:
      - edge-net

###############################################################################
# 📦 Volume 定義（資料持久化）
###############################################################################
volumes:
  db-data:
  redis-data:

###############################################################################
# 🌐 Network 定義（內外部隔離）
###############################################################################
networks:
  edge-net:
    external: true    # 需先用 `docker network create edge-net` 建立
  service-net:
    internal: true    # 僅限本 compose 內部使用

